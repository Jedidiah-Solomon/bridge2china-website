name: Deploy Vite React App to cPanel

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Build Vite React App
              run: npm run build
              env:
                  NODE_ENV: production

            - name: Deploy to cPanel via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  port: 21
                  protocol: ftp
                  local-dir: ./dist/
                  server-dir: public_html/
                  exclude: |
                      **/.git*
                      **/.git*/**
                      **/node_modules/**

                  # Optional: Delete files on server that don't exist locally
                  # delete-removed: true

                  # Optional: Test first without uploading
                  # dry-run: true

                  # Optional: Include hidden files
                  # include: |
                  #   **/.htaccess
